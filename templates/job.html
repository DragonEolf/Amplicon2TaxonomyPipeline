<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="5">
    <title>Job {{ job_id }}</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f8fb; color: #1f2933; }
      main { max-width: 760px; margin: 40px auto; padding: 0 20px; }
      section { background: #fff; border: 1px solid #d9e2ec; border-radius: 8px; padding: 24px; }
      code { background: #eef2f7; padding: 2px 6px; border-radius: 4px; }
      a { color: #1d4ed8; font-weight: 650; }
      .state { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #e0f2fe; color: #075985; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Job <code>{{ job_id }}</code></h1>
        <p><span class="state">{{ status.state }}</span></p>
        <p>{{ status.message }}</p>
        {% if outputs %}
          <h2>Outputs</h2>
          <ul>
            {% for file in outputs %}
              <li><a href="/jobs/{{ job_id }}/download/{{ file }}">{{ file }}</a></li>
            {% endfor %}
          </ul>
        {% endif %}
        <h2>Multi-sample summaries</h2>
        <ul>
          <li><a href="/summaries/asv_sample_matrix.csv">ASV sample matrix</a></li>
          <li><a href="/summaries/taxon_sample_matrix.csv">Taxon sample matrix</a></li>
        </ul>
        <p><a href="/">Start another job</a></p>
      </section>
    </main>
  </body>
</html>
